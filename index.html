<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  
    <title>Gerador de CPFs</title>
</head>
<body>
    <main class="container">
        <section class="gerar-box">
            <div>
                <h1 class="cor-titulo pg-formatacao">Gerador de CPFs</h1>
                <p class="pg-formatacao">Clique no botão para criar um CPF válido.</p>
            </div>

            <div class="gerador-controls">
                <p class="pg-formatacao">Formatação : </p>
                
                <div class="radio-group">
                    <label>
                        <input class="" id="idSim" type="radio" name="format" value="true" checked> Com Pontuação
                        <i class="bi bi-check-circle"></i>
                    </label>
                    <label>
                        <input id="idNao" type="radio" name="format" value="false"> Sem Pontuação
                        <i class="bi bi-dash-circle"></i>
                    </label>
                </div>

                <div class="div-botoes">
                    <button type="button" class="btn-gerador" onclick="main()">
                        <p class="bi bi-arrow-repeat" ></p>
                        <p id="id_p_geraCPF">Gerar CPF</p>
                    </button>
                </div>
                <div class="gerar-result">
                    <p>Resultado: </p>
                    <p id="resposta"></p>
                </div>
            </div>
        </section>
    </main>

    <script src="assets/js/script.js"></script>
    
</body>
</html>
