<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/CSS/style.css">
    <title>Gerador de CPFs</title>
</head>
<body>
    <main class="container">
        <section class="generator-box">
            <div>
                <h1 class="color-titulo pg-formatacao">Gerador de CPFs</h1>
                <p class="pg-formatacao">Clique no botão para criar um CPF válido.</p>
            </div>

            <div class="generator-controls">
                <p class="pg-formatacao">Formatação : </p>
                
                <div class="radio-group">
                    <label>
                        <input id="idSim" type="radio" name="format" value="true" checked> Com Pontuação
                    </label>
                    <label>
                        <input id="idNao" type="radio" name="format" value="false"> Sem Pontuação
                    </label>
                </div>

                <div class="div-botoes">
                    <button type="button" class="btn-generate" onclick="main()">
                        Gerar CPF
                    </button>
                </div>
                <div class="generator-result">
                    <p>Resultado: </p>
                    <p id="resposta"></p>
                </div>
            </div>
        </section>
    </main>

    <script src="assets/JS/script.js"></script>
</body>
</html>
