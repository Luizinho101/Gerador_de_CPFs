<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/CSS/style.css">
    <title>Gerador de CPFs</title>
</head>
<body>

    <main class="container">
        <section class="generator-box">
            <header class="generator-header">
                <h1>Gerador de CPFs</h1>
                <p>Clique no botão para criar um CPF válido.</p>
            </header>

            <div class="generator-controls">
                <p>Gerar com pontuação?</p>
                
                <div class="radio-group">
                    <label>
                        <input id="idSim" type="radio" name="format" value="true" checked> Sim
                    </label>
                    <label>
                        <input id="idNao" type="radio" name="format" value="false"> Não
                    </label>
                </div>

                <button type="button" class="btn-generate" onclick="main()">
                    Gerar CPF
                </button>
            </div>

            <div class="generator-result">
                <p id="resposta">---</p>
            </div>
        </section>
    </main>

    <script src="assets/JS/script.js"></script>
</body>
</html>
